name: Publish npm

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish without publishing the package
        required: true
        type: boolean
        default: true
      dist_tag:
        description: Optional npm dist-tag override, for example latest
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci
      - run: npm run check
      - run: npm run pack:smoke

      - name: Resolve package metadata
        env:
          DIST_TAG_INPUT: ${{ github.event.inputs.dist_tag || '' }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"

          if [[ "$VERSION" == *-* ]]; then
            echo "NPM_PRERELEASE_TAG=${VERSION#*-}" | sed 's/[.].*//' >> "$GITHUB_ENV"
          else
            echo "NPM_PRERELEASE_TAG=" >> "$GITHUB_ENV"
          fi

          if [[ -n "$DIST_TAG_INPUT" ]]; then
            echo "NPM_DIST_TAG=$DIST_TAG_INPUT" >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          elif [[ "$VERSION" == *-* ]]; then
            echo "NPM_DIST_TAG=${VERSION#*-}" | sed 's/[.].*//' >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - name: Check published version
        run: |
          if npm view "$PACKAGE_NAME@$PACKAGE_VERSION" version >/dev/null 2>&1; then
            echo "PACKAGE_ALREADY_PUBLISHED=true" >> "$GITHUB_ENV"
            echo "$PACKAGE_NAME@$PACKAGE_VERSION is already published. Skipping npm publish."
          else
            echo "PACKAGE_ALREADY_PUBLISHED=false" >> "$GITHUB_ENV"
          fi

      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --dry-run --access public --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package
        if: env.PACKAGE_ALREADY_PUBLISHED == 'false' && (github.event_name == 'push' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
        run: npm publish --access public --provenance --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update prerelease dist tag
        if: env.PACKAGE_ALREADY_PUBLISHED == 'false' && env.NPM_PRERELEASE_TAG != '' && env.NPM_PRERELEASE_TAG != env.NPM_DIST_TAG && (github.event_name == 'push' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
        run: npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" "$NPM_PRERELEASE_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
