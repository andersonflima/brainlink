name: Publish npm

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish without publishing the package
        required: true
        type: boolean
        default: true
      dist_tag:
        description: Optional npm dist-tag override, for example latest
        required: false
        type: string
        default: ""

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip publish]')
    runs-on: ubuntu-latest
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - run: npm ci

      - name: Resolve package metadata
        env:
          DIST_TAG_INPUT: ${{ github.event.inputs.dist_tag || '' }}
          SHOULD_AUTO_BUMP: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        run: |
          set -euo pipefail

          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")

          next_version() {
            node - "$1" <<'NODE'
          const version = process.argv[2]
          const match = version.match(/^(\d+)\.(\d+)\.(\d+)(?:-([0-9A-Za-z-]+)\.(\d+))?$/)
          if (!match) {
            throw new Error(`Unsupported package version: ${version}`)
          }

          const [, major, minor, patch, prereleaseName, prereleaseNumber] = match
          if (prereleaseName && prereleaseNumber) {
            console.log(`${major}.${minor}.${patch}-${prereleaseName}.${Number(prereleaseNumber) + 1}`)
          } else {
            console.log(`${major}.${minor}.${Number(patch) + 1}`)
          }
          NODE
          }

          VERSION_BUMPED=false
          PACKAGE_ALREADY_PUBLISHED=false

          if npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; then
            if [[ "$SHOULD_AUTO_BUMP" == "true" ]]; then
              while npm view "$PACKAGE_NAME@$VERSION" version >/dev/null 2>&1; do
                VERSION=$(next_version "$VERSION")
              done

              npm version "$VERSION" --no-git-tag-version
              VERSION_BUMPED=true
            else
              PACKAGE_ALREADY_PUBLISHED=true
              echo "$PACKAGE_NAME@$VERSION is already published. Skipping npm publish."
            fi
          fi

          echo "PACKAGE_NAME=$PACKAGE_NAME" >> "$GITHUB_ENV"
          echo "PACKAGE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "VERSION_BUMPED=$VERSION_BUMPED" >> "$GITHUB_ENV"
          echo "PACKAGE_ALREADY_PUBLISHED=$PACKAGE_ALREADY_PUBLISHED" >> "$GITHUB_ENV"

          if [[ "$VERSION" == *-* ]]; then
            echo "NPM_PRERELEASE_TAG=${VERSION#*-}" | sed 's/[.].*//' >> "$GITHUB_ENV"
          else
            echo "NPM_PRERELEASE_TAG=" >> "$GITHUB_ENV"
          fi

          if [[ -n "$DIST_TAG_INPUT" ]]; then
            echo "NPM_DIST_TAG=$DIST_TAG_INPUT" >> "$GITHUB_ENV"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          elif [[ "$VERSION" == *-* ]]; then
            echo "NPM_DIST_TAG=${VERSION#*-}" | sed 's/[.].*//' >> "$GITHUB_ENV"
          else
            echo "NPM_DIST_TAG=latest" >> "$GITHUB_ENV"
          fi

      - run: npm run check
      - run: npm run pack:smoke

      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --dry-run --access public --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish package
        if: env.PACKAGE_ALREADY_PUBLISHED == 'false' && (github.event_name == 'push' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
        run: npm publish --access public --provenance --tag "$NPM_DIST_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Update prerelease dist tag
        if: env.PACKAGE_ALREADY_PUBLISHED == 'false' && env.NPM_PRERELEASE_TAG != '' && env.NPM_PRERELEASE_TAG != env.NPM_DIST_TAG && (github.event_name == 'push' || github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run))
        run: npm dist-tag add "$PACKAGE_NAME@$PACKAGE_VERSION" "$NPM_PRERELEASE_TAG"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
